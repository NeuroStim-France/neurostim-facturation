<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroStim — Facturation</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCWqHnTnrIhXbiMTjmv6cedrYs3zhDmD2o",
      authDomain: "neurostim-facturation.firebaseapp.com",
      projectId: "neurostim-facturation",
      storageBucket: "neurostim-facturation.firebasestorage.app",
      messagingSenderId: "375100738781",
      appId: "1:375100738781:web:24e69ee640f01cd819df34"
    });
    const auth = firebase.auth();
    const db = firebase.firestore();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    #auth-screen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#eaf2f8,#f4f7fa,#dceefb);font-family:'DM Sans',sans-serif}
    #auth-box{background:#fff;border:1px solid #d0dbe8;border-radius:16px;padding:48px;width:400px;max-width:90vw;box-shadow:0 4px 24px rgba(26,82,118,.1)}
    #auth-title{font-size:28px;font-weight:700;color:#1a5276;text-align:center;margin-bottom:8px}
    #auth-title span{color:#2e86c1}
    #auth-sub{text-align:center;color:#8899b4;font-size:14px;margin-bottom:32px}
    .auth-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #d0dbe8;background:#f0f4f8;font-size:14px;font-family:inherit;margin-bottom:12px;box-sizing:border-box}
    .auth-input:focus{outline:0;border-color:#2e86c1;box-shadow:0 0 0 3px rgba(46,134,193,.15)}
    #auth-btn{width:100%;padding:12px;border-radius:8px;border:none;background:#2e86c1;color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
    #auth-btn:hover{background:#2471a3}
    #auth-err{color:#e74c3c;font-size:13px;text-align:center;margin-top:10px;min-height:20px}
    #auth-loading{text-align:center;color:#8899b4;font-size:14px;padding:8px 0}
    #cpw-overlay{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center}
    #cpw-box{background:#fff;border-radius:16px;padding:32px;width:380px;max-width:90vw;box-shadow:0 8px 40px rgba(0,0,0,.2)}
    #cpw-box h3{color:#1a5276;margin-bottom:4px;font-size:16px}
    #cpw-box p{color:#8899b4;font-size:13px;margin-bottom:20px}
    .cpw-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #d0dbe8;background:#f0f4f8;font-size:14px;font-family:inherit;margin-bottom:10px;box-sizing:border-box}
    #cpw-err{color:#e74c3c;font-size:13px;min-height:18px;margin-bottom:10px}
    #cpw-save{width:100%;padding:10px;border-radius:8px;border:none;background:#2e86c1;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
    #debug{position:fixed;bottom:10px;right:10px;background:#1a5276;color:#fff;padding:10px 14px;border-radius:8px;font-size:12px;font-family:monospace;z-index:99999;line-height:1.8}
  </style>
</head>
<body>

<div id="auth-screen">
  <div id="auth-box">
    <div id="auth-title">Neuro<span>Stim</span></div>
    <div id="auth-sub">Espace facturation</div>
    <div id="auth-loading">Chargement...</div>
    <div id="auth-form" style="display:none">
      <input id="auth-email" type="email" class="auth-input" placeholder="Email" />
      <input id="auth-pass" type="password" class="auth-input" placeholder="Mot de passe" />
      <button id="auth-btn" onclick="doLogin()">Se connecter</button>
      <div id="auth-err"></div>
    </div>
  </div>
</div>

<div id="cpw-overlay" style="display:none">
  <div id="cpw-box">
    <h3>🔑 Changement de mot de passe requis</h3>
    <p>Définissez un nouveau mot de passe pour votre compte.</p>
    <input class="cpw-input" id="cpw-new" type="password" placeholder="Nouveau mot de passe (min. 8 car.)" />
    <input class="cpw-input" id="cpw-confirm" type="password" placeholder="Confirmer" />
    <div id="cpw-err"></div>
    <button id="cpw-save" onclick="doChangePw()">Enregistrer</button>
  </div>
</div>

<div id="root"></div>

<div id="debug">
  Firebase: <span id="d-fb">?</span><br>
  Auth: <span id="d-auth">waiting</span><br>
  Mount: <span id="d-mount">?</span>
</div>

<script>
function d(id,v){ var e=document.getElementById(id); if(e) e.textContent=String(v); }

window.addEventListener('load', function(){
  d('d-fb', typeof firebase !== 'undefined' ? 'OK v'+firebase.SDK_VERSION : 'MISSING');
  d('d-mount', typeof window._mountApp);
});

window.NS_AUTH = {};
var currentUser = null;

auth.onAuthStateChanged(async function(user) {
  if(!user) {
    d('d-auth','not logged in');
    document.getElementById('auth-loading').style.display='none';
    document.getElementById('auth-form').style.display='block';
    return;
  }
  d('d-auth','fetching profile...');
  try {
    var snap = await db.doc('users/'+user.uid).get();
    if(!snap.exists){ await auth.signOut(); showErr("Compte non autorisé."); return; }
    var data = snap.data();
    if(data.disabled){ await auth.signOut(); showErr("Compte désactivé."); return; }
    currentUser = user;
    window.NS_AUTH = { user:{uid:user.uid,email:user.email}, role:data.role, displayName:data.displayName||user.email };
    d('d-auth','OK role='+data.role);
    if(data.mustChangePassword){
      document.getElementById('auth-screen').style.display='none';
      document.getElementById('cpw-overlay').style.display='flex';
      return;
    }
    mountApp();
  } catch(e){ d('d-auth','ERROR:'+e.message); showErr("Erreur: "+e.message); }
});

function showErr(msg){
  document.getElementById('auth-loading').style.display='none';
  document.getElementById('auth-form').style.display='block';
  document.getElementById('auth-err').textContent=msg;
}

function mountApp(){
  d('d-auth','mounting...');
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('cpw-overlay').style.display='none';
  d('d-mount', typeof window._mountApp);
  if(typeof window._mountApp === 'function'){
    try {
      window._mountApp();
      d('d-auth','done');
      // Check if root has content after 500ms
      setTimeout(function(){
        var r = document.getElementById('root');
        d('d-mount', r ? 'children:'+r.children.length+' html:'+r.innerHTML.length : 'no root');
      }, 500);
    } catch(e) {
      document.getElementById('root').innerHTML='<div style="padding:40px;color:red;font-family:sans-serif">Erreur mount: '+e.message+'<br>'+e.stack+'</div>';
      d('d-auth','ERROR:'+e.message);
    }
  } else {
    document.getElementById('root').innerHTML='<div style="padding:40px;color:orange;font-family:sans-serif">_mountApp introuvable</div>';
    d('d-auth','_mountApp missing');
  }
}

async function doLogin(){
  var email=document.getElementById('auth-email').value.trim();
  var pass=document.getElementById('auth-pass').value;
  var errEl=document.getElementById('auth-err');
  errEl.textContent='';
  if(!email||!pass){errEl.textContent='Remplir tous les champs.';return;}
  var btn=document.getElementById('auth-btn');
  btn.textContent='...';btn.disabled=true;
  try{ await auth.signInWithEmailAndPassword(email,pass); }
  catch(e){
    btn.textContent='Se connecter';btn.disabled=false;
    errEl.textContent=(e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'||e.code==='auth/user-not-found')
      ?'Email ou mot de passe incorrect.':'Erreur: '+e.message;
  }
}

async function doChangePw(){
  var nw=document.getElementById('cpw-new').value;
  var cf=document.getElementById('cpw-confirm').value;
  var errEl=document.getElementById('cpw-err');
  errEl.textContent='';
  if(nw.length<8){errEl.textContent='Minimum 8 caractères.';return;}
  if(nw!==cf){errEl.textContent='Mots de passe différents.';return;}
  try{
    await currentUser.updatePassword(nw);
    await db.doc('users/'+currentUser.uid).update({mustChangePassword:false});
    mountApp();
  }catch(e){errEl.textContent='Erreur: '+e.message;}
}

window.doLogout=async function(){ await auth.signOut(); window.location.reload(); };
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var f=document.getElementById('auth-form');
    if(f&&f.style.display!=='none') doLogin();
  }
});
</script>

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap');
:root{--bg:#f4f7fa;--card:#fff;--inp:#f0f4f8;--brd:#d0dbe8;--brf:#2e86c1;--tx:#334155;--txm:#8899b4;--txd:#1a5276;--acc:#2e86c1;--accl:#eaf2f8;--accg:rgba(46,134,193,.15);--ok:#27ae60;--okl:#eafaf1;--err:#e74c3c;--errl:#fdedec;--r:12px;--rs:8px;--sh:0 1px 3px rgba(26,82,118,.06),0 4px 16px rgba(26,82,118,.04)}
*{margin:0;padding:0;box-sizing:border-box}html,body,#root{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx)}
.app{min-height:100vh;display:flex;flex-direction:column}
.hd{display:flex;justify-content:space-between;align-items:center;padding:14px 32px;background:#fff;border-bottom:1px solid var(--brd);box-shadow:0 1px 4px rgba(26,82,118,.05);position:sticky;top:0;z-index:100}
.hd-logo{font-size:22px;font-weight:700;color:var(--txd);letter-spacing:-.5px}.hd-logo span{color:var(--acc)}
.hd-sub{font-size:11px;color:var(--txm);margin-top:1px;letter-spacing:1px;text-transform:uppercase}
.hd-r{display:flex;align-items:center;gap:12px}
.badge{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;background:var(--accl);color:var(--acc);border:1px solid rgba(46,134,193,.15)}
.tabs{display:flex;gap:2px;padding:10px 32px;background:#fff;border-bottom:1px solid var(--brd)}
.tab{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:500;color:var(--txm);background:0;border:0;cursor:pointer;transition:all .2s}
.tab:hover{color:var(--txd);background:var(--bg)}.tab.on{color:var(--acc);background:var(--accl)}
.ct{flex:1;padding:24px 32px 40px;max-width:1200px;margin:0 auto;width:100%}
.card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:16px 20px;margin-bottom:12px;box-shadow:var(--sh)}
.card-t{font-size:15px;font-weight:700;color:var(--txd);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.card-t .ic{color:var(--acc);font-size:16px}
.fr{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:3px;flex:1;min-width:150px}
.fl{font-size:11px;font-weight:600;color:var(--txm);text-transform:uppercase;letter-spacing:.5px}
.fi,.fs{padding:10px 14px;border-radius:var(--rs);background:var(--inp);border:1px solid var(--brd);color:var(--tx);font-size:14px;font-family:inherit;transition:border-color .2s,box-shadow .2s;width:100%}
.fi:focus,.fs:focus{outline:0;border-color:var(--brf);box-shadow:0 0 0 3px var(--accg)}.fi::placeholder{color:rgba(136,153,180,.6)}
.fs{appearance:auto}
.btn{padding:10px 20px;border-radius:var(--rs);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:0;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.bp{background:var(--acc);color:#fff;box-shadow:0 2px 8px rgba(46,134,193,.25)}.bp:hover{background:#2471a3;transform:translateY(-1px)}
.bs{background:#fff;color:var(--tx);border:1px solid var(--brd)}.bs:hover{background:var(--bg);border-color:var(--acc);color:var(--acc)}
.bd{background:var(--errl);color:var(--err);border:1px solid rgba(231,76,60,.2)}.bd:hover{background:rgba(231,76,60,.15)}
.bg{background:var(--ok);color:#fff;box-shadow:0 2px 8px rgba(39,174,96,.25)}.bg:hover{background:#229954;transform:translateY(-1px)}
.bsm{padding:6px 12px;font-size:12px}
.ar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg);border-radius:var(--rs);margin-bottom:4px;border:1px solid transparent;transition:border-color .2s}
.ar:hover{border-color:var(--brd)}.ar .fi,.ar .fs{padding:8px 10px;font-size:13px;background:#fff}
.ax{width:28px;height:28px;border-radius:50%;border:0;background:var(--errl);color:var(--err);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:background .2s}
.ax:hover{background:rgba(231,76,60,.2)}
.tb{display:flex;gap:12px;padding:14px 20px;background:linear-gradient(135deg,var(--accl),#dceefb);border:1px solid rgba(46,134,193,.15);border-radius:var(--r);margin:12px 0}
.ti{flex:1;text-align:center}.tl{font-size:11px;color:var(--txm);text-transform:uppercase;letter-spacing:.5px}
.tv{font-size:22px;font-weight:700;color:var(--txd);margin-top:4px}.tv.ac{color:var(--acc)}
.dt{width:100%;border-collapse:collapse}.dt th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--txm);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--brd);background:var(--bg)}
.dt td{padding:10px 14px;font-size:13px;border-bottom:1px solid #eef2f7}.dt tr:hover td{background:var(--accl)}.dt .nm{font-weight:600}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.sc{background:#fff;border:1px solid var(--brd);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.sct{font-size:12px;color:var(--txm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.scv{font-size:28px;font-weight:700;color:var(--txd)}.scs{font-size:12px;color:var(--acc);margin-top:4px;font-weight:500}
.dc{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.dch{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:16px;font-size:12px;font-weight:500;background:var(--accl);color:var(--acc);border:1px solid rgba(46,134,193,.15)}
.dch button{width:16px;height:16px;border-radius:50%;border:0;background:rgba(46,134,193,.15);color:var(--acc);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
.lc{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#eaf2f8,#f4f7fa,#dceefb)}
.lb{background:#fff;border:1px solid var(--brd);border-radius:16px;padding:48px;width:400px;max-width:90vw;box-shadow:0 4px 24px rgba(26,82,118,.1)}
.ll{font-size:32px;font-weight:700;color:var(--txd);text-align:center;margin-bottom:8px}.ll span{color:var(--acc)}
.ls{text-align:center;color:var(--txm);font-size:14px;margin-bottom:32px}
.toast{position:fixed;bottom:24px;right:24px;z-index:999;padding:14px 24px;border-radius:var(--r);background:var(--okl);border:1px solid rgba(39,174,96,.2);color:var(--ok);font-size:14px;font-weight:500;box-shadow:0 4px 24px rgba(26,82,118,.1);animation:si .3s ease}
.toast.w{background:#fef9e7;border-color:rgba(243,156,18,.2);color:#b7950b}
@keyframes si{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes successPulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes checkmark{0%{opacity:0;transform:scale(0)}50%{transform:scale(1.2)}100%{opacity:1;transform:scale(1)}}
.success-overlay{position:fixed;inset:0;z-index:9998;background:rgba(39,174,96,0.08);display:flex;align-items:center;justify-content:center;animation:si .3s ease}
.success-box{background:#fff;border:2px solid #27ae60;border-radius:16px;padding:40px 60px;text-align:center;box-shadow:0 8px 40px rgba(39,174,96,0.2);animation:successPulse .5s ease}
.success-check{font-size:48px;animation:checkmark .5s ease}
.success-text{font-size:18px;font-weight:600;color:#1a5276;margin-top:12px}
.success-sub{font-size:13px;color:#8899b4;margin-top:4px}
.search-box{position:relative}.search-box .fi{padding-left:32px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#8899b4;font-size:14px;pointer-events:none}
.fb{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}.fb .fs,.fb .fi{max-width:200px}
